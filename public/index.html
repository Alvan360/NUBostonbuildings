<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NU Digital Twin</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Fullscreen map canvas -->
  <div id="map-container">
    <div id="map"></div>
  </div>

  <!-- TOP CENTER: Compass bar -->
  <div id="compass-bar">
    <div id="compass-track"></div>
    <div id="compass-center-mark"></div>
  </div>

  <!-- LEFT OVERLAY PANEL -->
  <div id="left-panel" class="glass-panel">
    <!-- Search -->
    <div id="search-wrapper">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search buildings" />
    </div>

    <!-- Collapsible: Building Scale Models -->
    <div class="collapsible expanded">
      <div class="collapsible-header">
        <span class="collapse-arrow">&#9660;</span>
        <span>Building Scale Models</span>
      </div>
      <div class="collapsible-body">
        <label class="layer-item">
          <span class="layer-icon">&#9638;</span>
          <span class="layer-label">BIM</span>
        </label>
        <label class="layer-item">
          <span class="layer-icon">&#9678;</span>
          <span class="layer-label">Rhino (Building)</span>
        </label>
      </div>
    </div>

    <!-- Collapsible: Urban Scale Models -->
    <div class="collapsible expanded">
      <div class="collapsible-header">
        <span class="collapse-arrow">&#9660;</span>
        <span>Urban Scale Models</span>
      </div>
      <div class="collapsible-body">
        <label class="layer-item active-item">
          <span class="layer-icon">&#9730;</span>
          <span class="layer-label">OSM Buildings</span>
          <span class="active-dot"></span>
        </label>
        <label class="layer-item">
          <span class="layer-icon">&#9641;</span>
          <span class="layer-label">UBEM</span>
        </label>
      </div>
    </div>

    <!-- Footer links -->
    <div id="left-footer">
      <span class="footer-link"><span class="fi">&#63;</span> Help</span>
      <span class="footer-link"><span class="fi">&#9881;</span> Settings</span>
    </div>
  </div>

  <!-- RIGHT OVERLAY PANEL -->
  <div id="right-panel" class="glass-panel">
    <div class="right-section">
      <div class="right-section-header">Resources</div>
      <div class="resource-list">
        <a class="resource-item" href="https://github.com/Alvan360/NUBostonbuildings" target="_blank" style="text-decoration:none;">
          <span class="res-icon">&#128187;</span>
          <span class="res-label">GitHub</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Info panel (popup on building click) -->
  <div id="info-panel" class="hidden">
    <button id="close-panel">&times;</button>
    <div id="info-content"></div>
  </div>

  <!-- BOTTOM: Footer bar -->
  <div id="bottom-bar">
    <span id="copyright-text">NU Digital Twin | About | Share | Stats</span>
  </div>

  <!-- FLOATING BUTTONS -->
  <!-- Bottom-left: Camera -->
  <button id="btn-camera" class="float-btn float-btn-bottom-left" title="Screenshot">
    <span>&#128247;</span>
  </button>

  <!-- Bottom-right: Layer + Home -->
  <button id="btn-layers" class="float-btn float-btn-bottom-right float-btn-left" title="Layers">
    <span>&#9776;</span>
  </button>
  <button id="btn-home" class="float-btn float-btn-bottom-right float-btn-right" title="Home">
    <span>&#8962;</span>
  </button>

  <!-- Scale indicator -->
  <div id="scale-indicator">100 m</div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="buildings-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
